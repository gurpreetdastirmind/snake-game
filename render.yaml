services:
  - type: web
    name: ai-snake-game
    runtime: python

    buildCommand: |
      apt-get update && apt-get install -y \
        libgl1-mesa-glx \
        libglib2.0-0 \
        libsm6 \
        libxext6 \
        libxrender-dev \
        libgomp1 \
        libglib2.0-0
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: gunicorn app:app --timeout 120

    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14